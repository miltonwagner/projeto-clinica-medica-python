{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Agendamento de Consulta</h3>
        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Paciente
                    </label>

                    <select
                        name="paciente_id"
                        class="form-select"
                        required>

                        <option value="">
                            Selecione um paciente
                        </option>

                        {% for p in pacientes %}
                        <option value="{{ p.id }}">
                            {{ p.nome }}
                        </option>
                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Médico
                    </label>

                    <select
                        name="medico_id"
                        class="form-select"
                        required>

                        <option value="">
                            Selecione um médico
                        </option>

                        {% for m in medicos %}
                        <option value="{{ m.id }}">
                            {{ m.nome }} - {{ m.especialidade }}
                        </option>
                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Data da Consulta
                    </label>

                    <input
                        type="date"
                        name="data"
                        class="form-control"
                        required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Horário
                    </label>

                    <input
                        type="time"
                        name="hora"
                        class="form-control"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn btn-success">
                    Agendar Consulta
                </button>

                <a
                    href="/consultas"
                    class="btn btn-secondary">
                    Voltar
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
