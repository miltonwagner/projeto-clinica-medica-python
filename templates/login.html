<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            background: #f4f6f9;
            font-family: Arial;
        }

        .box {
            width: 350px;
            margin: 80px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px #ccc;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 5px 0;
        }

        button {
            width: 95%;
            padding: 10px;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn-login {
            background: #3498db;
        }

        .btn-login:hover {
            background: #2980b9;
        }

        .btn-voltar {
            background: #7f8c8d;
            margin-top: 10px;
        }

        .btn-voltar:hover {
            background: #636e72;
        }
    </style>
</head>

<body>

<div class="box">

    <img src="{{ url_for('static', filename='img/logo.jpg') }}"
         style="width: 100px; margin-bottom: 10px;">

    <h2>Clínica Médica</h2>

    <form method="POST">

        <input name="usuario" placeholder="Usuário">
        <input name="senha" type="password" placeholder="Senha">

        <!-- BOTÃO LOGIN -->
        <button class="btn-login" type="submit">Entrar</button>

    </form>

    <!-- BOTÃO VOLTAR (CORRETO E FUNCIONANDO) -->
    <button class="btn-voltar" type="button"
            onclick="window.location.href='/'">
        ← Voltar para página inicial
    </button>

</div>

</body>
</html>
